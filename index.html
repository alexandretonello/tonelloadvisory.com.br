"container\">\n    <p class=\"kicker reveal\">Modelagem financeira de projetos de energia<\u002Fp>\n    <h1 class=\"reveal\" style=\"--d:80ms\">Eu modelo projetos de energia.<\u002Fh1>\n    <p class=\"sub reveal\" style=\"--d:160ms\">Greenfield, construção ou operação. Modelos auditáveis, prontos para a decisão de investimento e a due diligence de financiadores.<\u002Fp>\n    <a href=\"#contato\" class=\"more reveal\" style=\"--d:240ms\">\n      <span class=\"t\">Entre em contato<\u002Fspan>\n      <span class=\"ar\" aria-hidden=\"true\">→<\u002Fspan>\n    <\u002Fa>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- BLOCO 3 — THE MODEL -->\n<section class=\"sec\" id=\"modelo\">\n  <div class=\"container sec-grid\">\n    <div class=\"sec-head reveal\">\n      <p class=\"eyebrow\">01 — O Modelo<\u002Fp>\n      <h2 class=\"sec-title\"><span class=\"em\">O<\u002Fspan> Modelo.<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"sec-body\">\n      <p class=\"lead reveal\">Modelo financeiro de metodologia própria, construído sob o padrão FAST (Financial Modelling Standards), com arquitetura auditável e mecânica de cálculo integralmente rastreável. O desenvolvimento combina automação por IA com julgamento técnico humano em cada etapa — <strong>human in the loop:<\u002Fstrong> a IA acelera a construção, o analista define as premissas, valida o raciocínio e assina o resultado.<\u002Fp>\n      <p class=\"lead reveal\" style=\"--d:60ms\">Entrega estrutura de capital, os indicadores de retorno, viabilidade e capacidade de pagamento pertinentes ao projeto — tais como TIR, VPL, payback, LCOE e DSCR — e análise de sensibilidade em cenários base, conservador e otimista. Estruturado para bancabilidade — construído com o rigor que sustenta a apresentação a bancos e investidores na captação de recursos — e adaptável a qualquer estágio do ativo: greenfield, construção ou operação.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- BLOCO 4 — THE MEMO -->\n<section class=\"sec\" id=\"memo\">\n  <div class=\"container sec-grid\">\n    <div class=\"sec-head reveal\">\n      <p class=\"eyebrow\">02 — O MEMO<\u002Fp>\n      <h2 class=\"sec-title\"><span class=\"em\">O<\u002Fspan> Memo.<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"sec-body\">\n      <p class=\"lead reveal\">Memorando técnico que acompanha e interpreta o modelo, traduzindo os resultados de cada cenário em leitura acionável. Construído no mesmo fluxo — a IA estrutura, o analista interpreta e assina — aponta os fatores que mais movem o valor (value drivers) e declara com transparência as premissas, fontes e limites da análise.<\u002Fp>\n      <p class=\"lead reveal\" style=\"--d:60ms\">Estruturado como memorando de decisão: conciso, sem prolixidade nem marketing, apto a sustentar tanto a deliberação interna quanto a mesa de negociação. Entrega uma dupla coesa — o número e a leitura que o sustenta.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- BLOCO 5 — HOW WE WORK -->\n<section class=\"sec\" id=\"processo\">\n  <div class=\"container sec-grid\">\n    <div class=\"sec-head reveal\">\n      <p class=\"eyebrow\">03 — O Método<\u002Fp>\n      <h2 class=\"sec-title\"><span class=\"em\">O<\u002Fspan> Método.<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"sec-body\">\n      <p class=\"lead reveal\">Começo com um levantamento estruturado das premissas — capacidade, geração, receita, CAPEX e OPEX —, cada entrada documentada quanto à origem, fornecida por você ou extraída de fontes setoriais de referência. A partir daí, estruturo o modelo em Excel sob o padrão FAST, adaptado ao estágio do projeto: greenfield, em construção ou em operação. O modelo é organizado, parametrizável e auditável — você muda uma premissa e o fluxo de caixa recalcula por inteiro.<\u002Fp>\n      <p class=\"lead reveal\" style=\"--d:60ms\">Na sequência, faço a análise completa: indicadores de retorno, custo de capital (WACC) e cenários base, conservador e otimista. A análise de sensibilidade mostra o que mais move o valor, tudo documentado. Você recebe O Modelo e O Memorando — ferramenta e interpretação, pronto para usar.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n\n\n<!-- BLOCO 7 — QUEM CONDUZ -->\n<section class=\"sec signoff\" id=\"trajetoria\">\n  <div class=\"container\">\n    <p class=\"eyebrow reveal\">04 — Trajetória<\u002Fp>\n    <h2 class=\"sec-title reveal\" style=\"--d:60ms\">Quem assina.<\u002Fh2>\n    <div class=\"grid\" style=\"margin-top:clamp(36px,5vw,56px)\">\n      <figure class=\"portrait reveal\" style=\"--d:80ms; margin:0\" aria-label=\"Retrato de Alexandre Fillard Tonello\">\n        <img src=\"data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAkACQAAD/4QD2RXhpZgAATU0AKgAAAAgABwEOAAIAAAALAAAAYgESAAMAAAABAAEAAAEaAAUAAAABAAAAbgEbAAUAAAABAAAAdgEoAAMAAAABAAIAAAEyAAIAAAAUAAAAfodpAAQAAAABAAAAkgAAAABTY3JlZW5zaG90AAAAAACQAAAAAQAAAJAAAAABMjAyNjowNDoyNiAwNDoxMzo1MwAABJADAAIAAAAUAAAAyJKGAAcAAAASAAAA3KACAAQAAAABAAAFKKADAAQAAAABAAAFNQAAAAAyMDI2OjA0OjI2IDA0OjEzOjUzAEFTQ0lJAAAAU2NyZWVuc2hvdP/tADhQaG90b3Nob3AgMy4wADhCSU0EBAAAAAAAADhCSU0EJQAAAAAAENQdjNmPALIE6YAJmOz4Qn7/4gIoSUNDX1BST0ZJTEUAAQEAAAIYYXBwbAQAAABtbnRyUkdCIFhZWiAH5gABAAEAAAAAAABhY3NwQVBQTAAAAABBUFBMAAAAAAAAAAAAAAAAAAAAAAAA9tYAAQAAAADTLWFwcGwAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAApkZXNjAAAA/AAAADBjcHJ0AAABLAAAAFB3dHB0AAABfAAAABRyWFlaAAABkAAAABRnWFlaAAABpAAAABRiWFlaAAABuAAAABRyVFJDAAABzAAAACBjaGFkAAAB7AAAACxiVFJDAAABzAAAACBnVFJDAAABzAAAACBtbHVjAAAAAAAAAAEAAAAMZW5VUwAAABQAAAAcAEQAaQBzAHAAbABhAHkAIABQADNtbHVjAAAAAAAAAAEAAAAMZW5VUwAAADQAAAAcAEMAbwBwAHkAcgBpAGcAaAB0ACAAQQBwAHAAbABlACAASQBuAGMALgAsACAAMgAwADIAMlhZWiAAAAAAAAD21QABAAAAANMsWFlaIAAAAAAAAIPfAAA9v////7tYWVogAAAAAAAASr8AALE3AAAKuVhZWiAAAAAAAAAoOAAAEQsAAMi5cGFyYQAAAAAAAwAAAAJmZgAA8qcAAA1ZAAAT0AAACltzZjMyAAAAAAABDEIAAAXe///zJgAAB5MAAP2Q///7ov///aMAAAPcAADAbv/AABEIBTUFKAMBIgACEQEDEQH/xAAfAAABBQEBAQEBAQAAAAAAAAAAAQIDBAUGBwgJCgv/xAC1EAACAQMDAgQDBQUEBAAAAX0BAgMABBEFEiExQQYTUWEHInEUMoGRoQgjQrHBFVLR8CQzYnKCCQoWFxgZGiUmJygpKjQ1Nj  <div class=\"bio reveal\" style=\"--d:140ms\">\n        <p class=\"name\">Alexandre Fillard Tonello.<\u002Fp>\n        <p>Mais de 15 anos em finanças no setor de energia — passando pela Eletrosul (Chief of Staff da diretoria administrativa, participou da due diligence da privatização da Eletrobras) e pelo Grupo Eletrobras (finanças corporativas e valuation; integrou a equipe que avaliou cinco leilões da ANEEL). Como CFO da Rouar S.A., joint venture binacional no Uruguai, liderou a captação de cerca de USD 60 milhões junto à CAF para o Parque Eólico Artilleros (65,1 MW). Modelou projetos no Brasil, América Latina e África em segmentos de hidrelétrica, eólica, solar, storage e biomassa. Formação em Administração pela UFSC e MBA Executivo em Negócios do Setor Elétrico pela FGV, complementada por educação executiva na University of Cambridge, University of London, Wharton School of the University of Pennsylvania, Yale School of Management e Nanjing University.<\u002Fp>\n        <a class=\"ln\" href=\"https://linkedin.com/in/alexandretonello\" target=\"_blank\" rel=\"noopener noreferrer\">\n          <svg class=\"in\" viewBox=\"0 0 24 24\" fill=\"#0A66C2\" aria-hidden=\"true\" width=\"20\" height=\"20\">\n            <path d=\"M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z\"><\u002Fpath>\n          <\u002Fsvg>\n          <span class=\"t\">Currículo completo no LinkedIn<\u002Fspan>\n        <\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- BLOCO 8 — CONTATO -->\n<section class=\"contato\" id= il assembled at runtime\n  (() => {\n    const link = document.getElementById('email-link');\n    if (!link) return;\n    const u = link.dataset.u, d = link.dataset.d, at = String.fromCharCode(64);\n    const email = u + at + d;\n    link.setAttribute('href', 'mail' + 'to:' + email);\n    const textEl = document.getElementById('email-text');\n    if (textEl) textEl.textContent = email;\n    const btn = document.getElementById('copy-email');\n    if (!btn) return;\n    const copy = async (e) => {\n      e.preventDefault(); e.stopPropagation();\n      try { await navigator.clipboard.writeText(email); }\n      catch(_){ const t=document.createElement('textarea'); t.value=email; document.body.appendChild(t); t.select(); document.execCommand('copy'); t.remove(); }\n      btn.textContent = 'Copiado'; btn.classList.add('copied');\n      setTimeout(() => { btn.textContent = 'Copiar'; btn.classList.remove('copied'); }, 1800);\n    };\n    btn.addEventListener('click', copy);\n    btn.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') copy(e); });\n  })();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
